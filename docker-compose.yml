version: '3.8'

services:
  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - app-network
  
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-backend
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
    env_file:
    - ./backend/.env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
